<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Canvas Studio - Advanced Text Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts for custom fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Poppins:wght@400;700;900&family=Roboto:wght@400;700;900&family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@400;700;900&family=Lobster&family=Dancing+Script:wght@400;700&family=Pacifico&family=Bebas+Neue&family=Oswald:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        canvas {
            cursor: crosshair;
            touch-action: none;
        }

        .tool-btn.active {
            background-color: rgb(59, 130, 246);
            color: white;
        }

        .color-input-wrapper {
            position: relative;
            overflow: hidden;
        }

        .color-input-wrapper input[type="color"] {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            cursor: pointer;
            opacity: 0;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: rgb(59, 130, 246);
            cursor: pointer;
            margin-top: -6px;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: rgb(75, 85, 99);
            border-radius: 2px;
        }

        /* Text input modal */
        .text-modal {
            position: fixed;
            z-index: 1000;
            background: rgb(31, 41, 55);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid rgb(55, 65, 81);
            min-width: 320px;
        }

        .text-modal textarea {
            resize: vertical;
            background: rgb(17, 24, 39);
            border: 1px solid rgb(75, 85, 99);
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-family: inherit;
            width: 100%;
            font-size: 14px;
        }

        .text-modal textarea:focus {
            outline: none;
            border-color: rgb(59, 130, 246);
        }

        /* Custom scrollbar */
        .overflow-y-auto::-webkit-scrollbar {
            width: 6px;
        }

        .overflow-y-auto::-webkit-scrollbar-track {
            background: rgb(31, 41, 55);
        }

        .overflow-y-auto::-webkit-scrollbar-thumb {
            background: rgb(75, 85, 99);
            border-radius: 3px;
        }

        .overflow-y-auto::-webkit-scrollbar-thumb:hover {
            background: rgb(107, 114, 128);
        }
    </style>
</head>

<body class="bg-gray-900 text-white h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 flex items-center justify-between shadow-lg z-10">
        <div class="flex items-center gap-3">
            <i data-lucide="palette" class="w-6 h-6 text-blue-400"></i>
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                Pro Canvas Studio
            </h1>
        </div>

        <div class="flex items-center gap-4">
            <!-- Canvas Background Toggle -->
            <div class="flex items-center gap-2 bg-gray-700 rounded-lg p-1">
                <button id="bgWhite" class="px-3 py-1 rounded-md text-sm font-medium transition-all bg-white text-gray-900 shadow-sm" onclick="setCanvasBg('white')">
                    <i data-lucide="sun" class="w-4 h-4 inline mr-1"></i>White
                </button>
                <button id="bgBlack" class="px-3 py-1 rounded-md text-sm font-medium transition-all text-gray-400 hover:text-white" onclick="setCanvasBg('black')">
                    <i data-lucide="moon" class="w-4 h-4 inline mr-1"></i>Black
                </button>
            </div>

            <button onclick="undo()" class="flex items-center gap-2 px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded-lg transition-colors text-sm font-medium" id="undoBtn" disabled>
                <i data-lucide="undo-2" class="w-4 h-4"></i>
                Undo
            </button>

            <button onclick="redo()" class="flex items-center gap-2 px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded-lg transition-colors text-sm font-medium" id="redoBtn" disabled>
                <i data-lucide="redo-2" class="w-4 h-4"></i>
                Redo
            </button>

            <button onclick="clearCanvas()" class="flex items-center gap-2 px-4 py-2 bg-red-500 hover:bg-red-600 rounded-lg transition-colors text-sm font-medium">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
                Clear
            </button>

            <button onclick="document.getElementById('imageUpload').click()" class="flex items-center gap-2 px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg transition-colors text-sm font-medium">
                <i data-lucide="image-plus" class="w-4 h-4"></i>
                Upload
            </button>

            <input type="file" id="imageUpload" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">

            <!-- Image Resize Modal -->
            <div id="resizeModal" class="fixed inset-0 bg-black bg-opacity-70 z-50 hidden items-center justify-center">
                <div class="bg-gray-800 rounded-xl p-6 w-96 shadow-2xl border border-gray-700">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i data-lucide="image" class="w-5 h-5 text-purple-400"></i>
                        Resize Image
                    </h3>

                    <div class="space-y-4">
                        <div class="flex items-center justify-center bg-gray-900 rounded-lg p-4 mb-4">
                            <img id="resizePreview" src="" alt="Preview" class="max-w-full max-h-32 object-contain">
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-xs text-gray-400 block mb-1">Width (px)</label>
                                <input type="number" id="resizeWidth" min="1" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm focus:border-purple-500 focus:outline-none">
                            </div>
                            <div>
                                <label class="text-xs text-gray-400 block mb-1">Height (px)</label>
                                <input type="number" id="resizeHeight" min="1" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm focus:border-purple-500 focus:outline-none">
                            </div>
                        </div>

                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="maintainAspect" checked class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-purple-600 focus:ring-purple-500">
                            <label for="maintainAspect" class="text-sm text-gray-300">Maintain aspect ratio</label>
                        </div>

                        <div>
                            <label class="text-xs text-gray-400 block mb-1">Position</label>
                            <select id="imagePosition" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm focus:border-purple-500 focus:outline-none">
                                <option value="center">Center</option>
                                <option value="top-left">Top Left</option>
                                <option value="top-right">Top Right</option>
                                <option value="bottom-left">Bottom Left</option>
                                <option value="bottom-right">Bottom Right</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button onclick="closeResizeModal()" class="flex-1 px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg transition-colors text-sm font-medium">
                            Cancel
                        </button>
                        <button onclick="applyImageResize()" class="flex-1 px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg transition-colors text-sm font-medium">
                            Apply
                        </button>
                    </div>
                </div>
            </div>

            <button onclick="downloadCanvas()" class="flex items-center gap-2 px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg transition-colors text-sm font-medium">
                <i data-lucide="download" class="w-4 h-4"></i>
                Save
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden">

        <!-- Toolbar Sidebar -->
        <aside class="w-80 bg-gray-800 border-r border-gray-700 flex flex-col overflow-y-auto">

            <!-- Tools Section -->
            <div class="p-4 border-b border-gray-700">
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Tools</h3>
                <div class="grid grid-cols-4 gap-2">
                    <button class="tool-btn active p-3 rounded-lg bg-gray-700 hover:bg-gray-600 transition-colors flex flex-col items-center gap-1" onclick="setTool('brush')" id="tool-brush">
                        <i data-lucide="brush" class="w-5 h-5"></i>
                        <span class="text-xs">Brush</span>
                    </button>
                    <button class="tool-btn p-3 rounded-lg bg-gray-700 hover:bg-gray-600 transition-colors flex flex-col items-center gap-1" onclick="setTool('line')" id="tool-line">
                        <i data-lucide="minus" class="w-5 h-5"></i>
                        <span class="text-xs">Line</span>
                    </button>
                    <button class="tool-btn p-3 rounded-lg bg-gray-700 hover:bg-gray-600 transition-colors flex flex-col items-center gap-1" onclick="setTool('rectangle')" id="tool-rectangle">
                        <i data-lucide="square" class="w-5 h-5"></i>
                        <span class="text-xs">Rect</span>
                    </button>
                    <button class="tool-btn p-3 rounded-lg bg-gray-700 hover:bg-gray-600 transition-colors flex flex-col items-center gap-1" onclick="setTool('circle')" id="tool-circle">
                        <i data-lucide="circle" class="w-5 h-5"></i>
                        <span class="text-xs">Circle</span>
                    </button>
                    <button class="tool-btn p-3 rounded-lg bg-gray-700 hover:bg-gray-600 transition-colors flex flex-col items-center gap-1" onclick="setTool('triangle')" id="tool-triangle">
                        <i data-lucide="triangle" class="w-5 h-5"></i>
                        <span class="text-xs">Tri</span>
                    </button>
                    <button class="tool-btn p-3 rounded-lg bg-gray-700 hover:bg-gray-600 transition-colors flex flex-col items-center gap-1" onclick="setTool('hexagon')" id="tool-hexagon">
                        <i data-lucide="hexagon" class="w-5 h-5"></i>
                        <span class="text-xs">Hex</span>
                    </button>
                    <button class="tool-btn p-3 rounded-lg bg-gray-700 hover:bg-gray-600 transition-colors flex flex-col items-center gap-1" onclick="setTool('pentagon')" id="tool-pentagon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M12 2l9.5 7L18 22H6L2.5 9z"/></svg>
                        <span class="text-xs">Pent</span>
                    </button>
                    <button class="tool-btn p-3 rounded-lg bg-gray-700 hover:bg-gray-600 transition-colors flex flex-col items-center gap-1" onclick="setTool('rounded-rectangle')" id="tool-rounded-rectangle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><rect x="3" y="3" width="18" height="18" rx="4" ry="4"/></svg>
                        <span class="text-xs">Round</span>
                    </button>
                    <button class="tool-btn p-3 rounded-lg bg-gray-700 hover:bg-gray-600 transition-colors flex flex-col items-center gap-1" onclick="setTool('eraser')" id="tool-eraser">
                        <i data-lucide="eraser" class="w-5 h-5"></i>
                        <span class="text-xs">Eraser</span>
                    </button>
                    <button class="tool-btn p-3 rounded-lg bg-gray-700 hover:bg-gray-600 transition-colors flex flex-col items-center gap-1" onclick="setTool('text')" id="tool-text">
                        <i data-lucide="type" class="w-5 h-5"></i>
                        <span class="text-xs">Text</span>
                    </button>
                    <button class="tool-btn p-3 rounded-lg bg-gray-700 hover:bg-gray-600 transition-colors flex flex-col items-center gap-1" onclick="fillCanvas()" id="tool-fill">
                        <i data-lucide="paint-bucket" class="w-5 h-5"></i>
                        <span class="text-xs">Fill</span>
                    </button>
                </div>
            </div>

            <!-- Color Section -->
            <div class="p-4 border-b border-gray-700 space-y-4">
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Color</h3>

                <!-- Color Picker Preview -->
                <div class="flex items-center gap-3">
                    <div class="color-input-wrapper w-12 h-12 rounded-lg border-2 border-gray-600 shadow-inner"
                        id="colorPreview" style="background-color: #3b82f6;">
                        <input type="color" id="colorPicker" value="#3b82f6">
                    </div>
                    <div class="flex-1">
                        <label class="text-xs text-gray-500 block mb-1">Hex Code</label>
                        <input type="text" id="hexInput" value="#3b82f6"
                            class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1 text-sm font-mono uppercase focus:border-blue-500 focus:outline-none"
                            maxlength="7">
                    </div>
                </div>

                <!-- RGB Inputs -->
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="text-xs text-red-400 block mb-1 font-medium">R</label>
                        <input type="number" id="rInput" min="0" max="255" value="59"
                            class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1 text-sm focus:border-red-500 focus:outline-none text-center">
                    </div>
                    <div>
                        <label class="text-xs text-green-400 block mb-1 font-medium">G</label>
                        <input type="number" id="gInput" min="0" max="255" value="130"
                            class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1 text-sm focus:border-green-500 focus:outline-none text-center">
                    </div>
                    <div>
                        <label class="text-xs text-blue-400 block mb-1 font-medium">B</label>
                        <input type="number" id="bInput" min="0" max="255" value="246"
                            class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1 text-sm focus:border-blue-500 focus:outline-none text-center">
                    </div>
                </div>

                <!-- Quick Colors -->
                <div class="grid grid-cols-8 gap-1">
                    <button onclick="setQuickColor('#000000')" class="w-6 h-6 rounded bg-black border border-gray-600 hover:scale-110 transition-transform"></button>
                    <button onclick="setQuickColor('#ffffff')" class="w-6 h-6 rounded bg-white border border-gray-600 hover:scale-110 transition-transform"></button>
                    <button onclick="setQuickColor('#ef4444')" class="w-6 h-6 rounded bg-red-500 hover:scale-110 transition-transform"></button>
                    <button onclick="setQuickColor('#f97316')" class="w-6 h-6 rounded bg-orange-500 hover:scale-110 transition-transform"></button>
                    <button onclick="setQuickColor('#eab308')" class="w-6 h-6 rounded bg-yellow-500 hover:scale-110 transition-transform"></button>
                    <button onclick="setQuickColor('#22c55e')" class="w-6 h-6 rounded bg-green-500 hover:scale-110 transition-transform"></button>
                    <button onclick="setQuickColor('#3b82f6')" class="w-6 h-6 rounded bg-blue-500 hover:scale-110 transition-transform"></button>
                    <button onclick="setQuickColor('#a855f7')" class="w-6 h-6 rounded bg-purple-500 hover:scale-110 transition-transform"></button>
                </div>
            </div>

            <!-- Brush Size Section (RESTORED) -->
            <div class="p-4 border-b border-gray-700">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Brush Size</h3>
                    <span id="sizeValue" class="text-xs bg-gray-700 px-2 py-1 rounded font-mono">5px</span>
                </div>
                <input type="range" id="brushSize" min="1" max="100" value="5" class="w-full">
                <div class="mt-3 flex justify-center">
                    <div id="brushPreview" class="rounded-full bg-blue-500" style="width: 5px; height: 5px;"></div>
                </div>
            </div>

            <!-- Font Size Section (NEW - for text only) -->
            <div class="p-4 border-b border-gray-700">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Font Size</h3>
                    <span id="fontSizeValue" class="text-xs bg-gray-700 px-2 py-1 rounded font-mono">32px</span>
                </div>
                <input type="range" id="fontSizeSlider" min="8" max="200" value="32" class="w-full">
                <div class="flex gap-2 mt-3">
                    <button onclick="setFontSize(16)" class="flex-1 text-xs bg-gray-700 hover:bg-gray-600 rounded px-2 py-1 transition-colors">16</button>
                    <button onclick="setFontSize(32)" class="flex-1 text-xs bg-gray-700 hover:bg-gray-600 rounded px-2 py-1 transition-colors">32</button>
                    <button onclick="setFontSize(64)" class="flex-1 text-xs bg-gray-700 hover:bg-gray-600 rounded px-2 py-1 transition-colors">64</button>
                    <button onclick="setFontSize(128)" class="flex-1 text-xs bg-gray-700 hover:bg-gray-600 rounded px-2 py-1 transition-colors">128</button>
                </div>
            </div>

            <!-- Opacity Section (RESTORED) -->
            <div class="p-4 border-b border-gray-700">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Opacity</h3>
                    <span id="opacityValue" class="text-xs bg-gray-700 px-2 py-1 rounded font-mono">100%</span>
                </div>
                <input type="range" id="opacity" min="1" max="100" value="100" class="w-full">
            </div>

            <!-- Custom Fonts Section -->
            <div class="p-4 border-b border-gray-700">
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">Custom Fonts</h3>
                <select id="fontFamily" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm focus:border-blue-500 focus:outline-none mb-3">
                    <optgroup label="System Fonts">
                        <option value="Arial">Arial</option>
                        <option value="Verdana">Verdana</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Courier New">Courier New</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Comic Sans MS">Comic Sans MS</option>
                        <option value="Impact">Impact</option>
                    </optgroup>
                    <optgroup label="Google Fonts (Custom)">
                        <option value="'Inter', sans-serif">Inter</option>
                        <option value="'Poppins', sans-serif">Poppins</option>
                        <option value="'Roboto', sans-serif">Roboto</option>
                        <option value="'Playfair Display', serif">Playfair Display</option>
                        <option value="'Montserrat', sans-serif">Montserrat</option>
                        <option value="'Lobster', cursive">Lobster</option>
                        <option value="'Dancing Script', cursive">Dancing Script</option>
                        <option value="'Pacifico', cursive">Pacifico</option>
                        <option value="'Bebas Neue', sans-serif">Bebas Neue</option>
                        <option value="'Oswald', sans-serif">Oswald</option>
                    </optgroup>
                </select>

                <!-- Custom Font URL input -->
                <label class="text-xs text-gray-400 block mb-1">Custom Font URL (Optional)</label>
                <div class="flex gap-2">
                    <input type="text" id="customFontUrl" placeholder="https://fonts.googleapis.com/css2?family=YourFont"
                        class="flex-1 bg-gray-900 border border-gray-600 rounded px-2 py-1 text-xs focus:border-blue-500 focus:outline-none">
                    <button onclick="loadCustomFont()" class="px-3 py-1 bg-purple-600 hover:bg-purple-700 rounded text-xs transition-colors">Load</button>
                </div>
                <input type="text" id="customFontName" placeholder="Font Family Name"
                    class="w-full mt-2 bg-gray-900 border border-gray-600 rounded px-2 py-1 text-xs focus:border-blue-500 focus:outline-none">
            </div>

            <!-- Text Style -->
            <div class="p-4 border-b border-gray-700">
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">Text Style</h3>
                <div class="flex gap-2">
                    <button id="textBold" onclick="toggleTextStyle('bold')" class="flex-1 p-2 rounded bg-gray-700 hover:bg-gray-600 transition-colors text-sm">
                        <i data-lucide="bold" class="w-4 h-4 inline"></i> Bold
                    </button>
                    <button id="textItalic" onclick="toggleTextStyle('italic')" class="flex-1 p-2 rounded bg-gray-700 hover:bg-gray-600 transition-colors text-sm">
                        <i data-lucide="italic" class="w-4 h-4 inline"></i> Italic
                    </button>
                    <button id="textUnderline" onclick="toggleTextStyle('underline')" class="flex-1 p-2 rounded bg-gray-700 hover:bg-gray-600 transition-colors text-sm">
                        <i data-lucide="underline" class="w-4 h-4 inline"></i> Underline
                    </button>
                </div>
            </div>

            <!-- Text Alignment -->
            <div class="p-4">
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">Alignment</h3>
                <div class="flex gap-2">
                    <button onclick="setTextAlign('left')" class="flex-1 p-2 rounded bg-gray-700 hover:bg-gray-600 transition-colors text-sm">
                        <i data-lucide="align-left" class="w-4 h-4 inline"></i> Left
                    </button>
                    <button onclick="setTextAlign('center')" class="flex-1 p-2 rounded bg-gray-700 hover:bg-gray-600 transition-colors text-sm">
                        <i data-lucide="align-center" class="w-4 h-4 inline"></i> Center
                    </button>
                    <button onclick="setTextAlign('right')" class="flex-1 p-2 rounded bg-gray-700 hover:bg-gray-600 transition-colors text-sm">
                        <i data-lucide="align-right" class="w-4 h-4 inline"></i> Right
                    </button>
                </div>
                <div class="mt-2 text-xs text-gray-500 text-center">Note: Alignment affects text placement</div>
            </div>
        </aside>

        <!-- Canvas Container -->
        <main class="flex-1 bg-gray-900 relative overflow-hidden flex items-center justify-center p-8">
            <div class="relative shadow-2xl rounded-lg overflow-hidden bg-white" id="canvasWrapper">
                <canvas id="canvas" class="block"></canvas>
            </div>
        </main>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const canvasWrapper = document.getElementById('canvasWrapper');
        
        // State
        let isDrawing = false;
        let currentTool = 'brush';
        let startX, startY;
        let snapshot;
        let canvasBg = 'white';
        
        // Undo/Redo history
        let history = [];
        let historyStep = -1;
        const MAX_HISTORY = 50;
        
        // Color state
        let currentColor = { r: 59, g: 130, b: 246 };
        let currentOpacity = 1;
        
        // Text style state
        let textBold = false;
        let textItalic = false;
        let textUnderline = false;
        let textAlign = 'left';
        
        // Set canvas size
        function resizeCanvas() {
            const container = canvasWrapper.parentElement;
            const maxWidth = container.clientWidth - 64;
            const maxHeight = container.clientHeight - 64;
            
            canvas.width = maxWidth;
            canvas.height = maxHeight;
            
            // Fill background
            ctx.fillStyle = canvasBg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Save initial state
            saveState();
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Drawing functions
        function startDraw(e) {
            if (currentTool === 'text') {
                // For text tool, show text input modal instead of drawing
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                showTextInput(x, y);
                return;
            }
            
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
            
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            
            // Save snapshot for shapes
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            // Use brush size for drawing tools
            ctx.lineWidth = document.getElementById('brushSize').value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            const color = `rgba(${currentColor.r}, ${currentColor.g}, ${currentColor.b}, ${currentOpacity})`;
            ctx.strokeStyle = currentTool === 'eraser' ? (canvasBg === 'white' ? '#ffffff' : '#000000') : color;
            ctx.fillStyle = color;
        }

        function draw(e) {
            if (!isDrawing) return;
            
            const rect = canvas.getBoundingClientRect();
            const currentX = e.clientX - rect.left;
            const currentY = e.clientY - rect.top;
            
            if (currentTool === 'brush' || currentTool === 'eraser') {
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
            } else if (currentTool === 'line') {
                ctx.putImageData(snapshot, 0, 0);
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
            } else if (currentTool === 'rectangle') {
                ctx.putImageData(snapshot, 0, 0);
                ctx.beginPath();
                ctx.rect(startX, startY, currentX - startX, currentY - startY);
                ctx.stroke();
            } else if (currentTool === 'circle') {
                ctx.putImageData(snapshot, 0, 0);
                ctx.beginPath();
                const radius = Math.sqrt(Math.pow(currentX - startX, 2) + Math.pow(currentY - startY, 2));
                ctx.arc(startX, startY, radius, 0, 2 * Math.PI);
                ctx.stroke();
            } else if (currentTool === 'triangle') {
                ctx.putImageData(snapshot, 0, 0);
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(currentX, currentY);
                ctx.lineTo(startX - (currentX - startX), currentY);
                ctx.closePath();
                ctx.stroke();
            } else if (currentTool === 'hexagon') {
                ctx.putImageData(snapshot, 0, 0);
                drawPolygon(ctx, startX, startY, currentX, currentY, 6);
            } else if (currentTool === 'pentagon') {
                ctx.putImageData(snapshot, 0, 0);
                drawPolygon(ctx, startX, startY, currentX, currentY, 5);
            } else if (currentTool === 'rounded-rectangle') {
                ctx.putImageData(snapshot, 0, 0);
                const width = currentX - startX;
                const height = currentY - startY;
                const radius = Math.min(Math.abs(width), Math.abs(height)) * 0.2;
                ctx.beginPath();
                roundRect(ctx, startX, startY, width, height, radius);
                ctx.stroke();
            }
        }

        function stopDraw() {
            if (isDrawing) {
                isDrawing = false;
                ctx.beginPath();
                saveState();
            }
        }

        // Event listeners
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseout', stopDraw);

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousemove', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });

        canvas.addEventListener('touchend', (e) => {
            const mouseEvent = new MouseEvent('mouseup', {});
            canvas.dispatchEvent(mouseEvent);
        });

        // Text tool functions
        function showTextInput(x, y) {
            // Remove any existing text modal
            const existingModal = document.querySelector('.text-modal');
            if (existingModal) existingModal.remove();
            
            // Create modal
            const modal = document.createElement('div');
            modal.className = 'text-modal';
            modal.style.left = (x + canvas.getBoundingClientRect().left + 10) + 'px';
            modal.style.top = (y + canvas.getBoundingClientRect().top - 120) + 'px';
            
            const fontSize = document.getElementById('fontSizeSlider').value;
            const fontFamily = document.getElementById('fontFamily').value;
            const previewFont = `${textBold ? 'bold' : ''} ${textItalic ? 'italic' : ''} ${fontSize}px ${fontFamily}`;
            
            modal.innerHTML = `
                <div class="flex justify-between items-center mb-3">
                    <span class="text-sm font-semibold text-gray-300">Enter your text</span>
                    <button onclick="this.closest('.text-modal').remove()" class="text-gray-400 hover:text-white">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <textarea id="textInputArea" rows="4" placeholder="Type your text here...&#10;Multi-line supported!" class="mb-3" style="font-family: ${fontFamily}; font-size: ${fontSize}px;"></textarea>
                <div class="flex gap-2">
                    <button onclick="addTextToCanvas(${x}, ${y})" class="flex-1 px-3 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-medium">Add Text</button>
                    <button onclick="this.closest('.text-modal').remove()" class="flex-1 px-3 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm font-medium">Cancel</button>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Focus the textarea
            setTimeout(() => {
                const textarea = document.getElementById('textInputArea');
                if (textarea) textarea.focus();
            }, 50);
            
            // Reinitialize icons in modal
            lucide.createIcons();
        }
        
        function addTextToCanvas(x, y) {
            const textarea = document.getElementById('textInputArea');
            const text = textarea.value.trim();
            
            if (!text) {
                const modal = document.querySelector('.text-modal');
                if (modal) modal.remove();
                return;
            }
            
            const fontSize = document.getElementById('fontSizeSlider').value;
            const fontFamily = document.getElementById('fontFamily').value;
            const color = `rgba(${currentColor.r}, ${currentColor.g}, ${currentColor.b}, ${currentOpacity})`;
            
            let fontStyle = '';
            if (textBold && textItalic) fontStyle = 'bold italic';
            else if (textBold) fontStyle = 'bold';
            else if (textItalic) fontStyle = 'italic';
            else fontStyle = 'normal';
            
            ctx.font = `${fontStyle} ${fontSize}px ${fontFamily}`;
            ctx.fillStyle = color;
            ctx.textAlign = textAlign;
            ctx.shadowBlur = 0;
            
            // Handle multiline text
            const lines = text.split('\n');
            const lineHeight = parseInt(fontSize) * 1.3;
            
            // Calculate text width for alignment
            let startX = x;
            if (textAlign === 'center') {
                let maxWidth = 0;
                lines.forEach(line => {
                    const metrics = ctx.measureText(line);
                    if (metrics.width > maxWidth) maxWidth = metrics.width;
                });
                startX = x;
            } else if (textAlign === 'right') {
                startX = x;
            }
            
            lines.forEach((line, i) => {
                ctx.fillText(line, startX, y + (i * lineHeight));
                
                // Add underline if enabled
                if (textUnderline && line.length > 0) {
                    const metrics = ctx.measureText(line);
                    const textY = y + (i * lineHeight);
                    ctx.beginPath();
                    ctx.moveTo(startX, textY + 2);
                    ctx.lineTo(startX + metrics.width, textY + 2);
                    ctx.strokeStyle = color;
                    ctx.lineWidth = Math.max(1, fontSize / 15);
                    ctx.stroke();
                }
            });
            
            saveState();
            
            // Remove modal
            const modal = document.querySelector('.text-modal');
            if (modal) modal.remove();
        }
        
        function toggleTextStyle(style) {
            if (style === 'bold') {
                textBold = !textBold;
                const btn = document.getElementById('textBold');
                if (textBold) {
                    btn.classList.add('bg-blue-600', 'text-white');
                    btn.classList.remove('bg-gray-700');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('bg-gray-700');
                }
            } else if (style === 'italic') {
                textItalic = !textItalic;
                const btn = document.getElementById('textItalic');
                if (textItalic) {
                    btn.classList.add('bg-blue-600', 'text-white');
                    btn.classList.remove('bg-gray-700');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('bg-gray-700');
                }
            } else if (style === 'underline') {
                textUnderline = !textUnderline;
                const btn = document.getElementById('textUnderline');
                if (textUnderline) {
                    btn.classList.add('bg-blue-600', 'text-white');
                    btn.classList.remove('bg-gray-700');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('bg-gray-700');
                }
            }
        }
        
        function setTextAlign(align) {
            textAlign = align;
            // Update button styles
            document.querySelectorAll('[onclick^="setTextAlign"]').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-gray-700');
            });
            const buttons = {
                left: document.querySelector('[onclick="setTextAlign(\'left\')"]'),
                center: document.querySelector('[onclick="setTextAlign(\'center\')"]'),
                right: document.querySelector('[onclick="setTextAlign(\'right\')"]')
            };
            if (buttons[align]) {
                buttons[align].classList.add('bg-blue-600', 'text-white');
                buttons[align].classList.remove('bg-gray-700');
            }
        }
        
        function setFontSize(size) {
            document.getElementById('fontSizeSlider').value = size;
            document.getElementById('fontSizeValue').textContent = size + 'px';
        }
        
        function loadCustomFont() {
            const fontUrl = document.getElementById('customFontUrl').value;
            const fontName = document.getElementById('customFontName').value;
            
            if (!fontUrl || !fontName) {
                alert('Please enter both Font URL and Font Family Name');
                return;
            }
            
            // Load the custom font
            const link = document.createElement('link');
            link.href = fontUrl;
            link.rel = 'stylesheet';
            document.head.appendChild(link);
            
            // Add to font select dropdown
            const select = document.getElementById('fontFamily');
            const option = document.createElement('option');
            option.value = `'${fontName}', sans-serif`;
            option.textContent = fontName + ' (Custom)';
            select.appendChild(option);
            select.value = `'${fontName}', sans-serif`;
            
            // Clear inputs
            document.getElementById('customFontUrl').value = '';
            document.getElementById('customFontName').value = '';
            
            alert(`Font "${fontName}" loaded successfully!`);
        }

        // Tool selection
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tool-${tool}`).classList.add('active');
        }

        // Color management
        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function updateColorFromHex() {
            const hex = document.getElementById('hexInput').value;
            if (/^#[0-9A-F]{6}$/i.test(hex)) {
                const rgb = hexToRgb(hex);
                if (rgb) {
                    currentColor = rgb;
                    document.getElementById('rInput').value = rgb.r;
                    document.getElementById('gInput').value = rgb.g;
                    document.getElementById('bInput').value = rgb.b;
                    document.getElementById('colorPicker').value = hex;
                    document.getElementById('colorPreview').style.backgroundColor = hex;
                }
            }
        }

        function updateColorFromRGB() {
            const r = parseInt(document.getElementById('rInput').value) || 0;
            const g = parseInt(document.getElementById('gInput').value) || 0;
            const b = parseInt(document.getElementById('bInput').value) || 0;
            
            currentColor = { r, g, b };
            const hex = rgbToHex(r, g, b);
            document.getElementById('hexInput').value = hex;
            document.getElementById('colorPicker').value = hex;
            document.getElementById('colorPreview').style.backgroundColor = hex;
        }

        function updateColorFromPicker() {
            const hex = document.getElementById('colorPicker').value;
            currentColor = hexToRgb(hex);
            document.getElementById('hexInput').value = hex;
            document.getElementById('rInput').value = currentColor.r;
            document.getElementById('gInput').value = currentColor.g;
            document.getElementById('bInput').value = currentColor.b;
            document.getElementById('colorPreview').style.backgroundColor = hex;
        }

        function setQuickColor(hex) {
            document.getElementById('colorPicker').value = hex;
            updateColorFromPicker();
        }

        // Event listeners for color inputs
        document.getElementById('hexInput').addEventListener('input', updateColorFromHex);
        document.getElementById('colorPicker').addEventListener('input', updateColorFromPicker);
        document.getElementById('rInput').addEventListener('input', updateColorFromRGB);
        document.getElementById('gInput').addEventListener('input', updateColorFromRGB);
        document.getElementById('bInput').addEventListener('input', updateColorFromRGB);

        // Brush size slider
        document.getElementById('brushSize').addEventListener('input', (e) => {
            const size = e.target.value;
            document.getElementById('sizeValue').textContent = size + 'px';
            document.getElementById('brushPreview').style.width = size + 'px';
            document.getElementById('brushPreview').style.height = size + 'px';
        });

        // Font size slider
        document.getElementById('fontSizeSlider').addEventListener('input', (e) => {
            const size = e.target.value;
            document.getElementById('fontSizeValue').textContent = size + 'px';
        });

        // Opacity slider
        document.getElementById('opacity').addEventListener('input', (e) => {
            currentOpacity = e.target.value / 100;
            document.getElementById('opacityValue').textContent = e.target.value + '%';
            document.getElementById('brushPreview').style.opacity = currentOpacity;
        });

        // Canvas background
        function setCanvasBg(color) {
            canvasBg = color;
            const bgWhite = document.getElementById('bgWhite');
            const bgBlack = document.getElementById('bgBlack');
            
            if (color === 'white') {
                bgWhite.classList.add('bg-white', 'text-gray-900', 'shadow-sm');
                bgWhite.classList.remove('text-gray-400');
                bgBlack.classList.remove('bg-black', 'text-white', 'shadow-sm');
                bgBlack.classList.add('text-gray-400');
                canvasWrapper.style.backgroundColor = 'white';
                canvas.style.backgroundColor = 'white';
            } else {
                bgBlack.classList.add('bg-black', 'text-white', 'shadow-sm');
                bgBlack.classList.remove('text-gray-400');
                bgWhite.classList.remove('bg-white', 'text-gray-900', 'shadow-sm');
                bgWhite.classList.add('text-gray-400');
                canvasWrapper.style.backgroundColor = 'black';
                canvas.style.backgroundColor = 'black';
            }
            
            // Redraw background
            ctx.fillStyle = color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveState();
        }

        // Save state to history
        function saveState() {
            if (historyStep < history.length - 1) {
                history = history.slice(0, historyStep + 1);
            }
            
            history.push(canvas.toDataURL());
            
            if (history.length > MAX_HISTORY) {
                history.shift();
            } else {
                historyStep++;
            }
            
            updateUndoRedoButtons();
        }

        function undo() {
            if (historyStep > 0) {
                historyStep--;
                restoreState();
            }
        }

        function redo() {
            if (historyStep < history.length - 1) {
                historyStep++;
                restoreState();
            }
        }

        function restoreState() {
            const img = new Image();
            img.src = history[historyStep];
            img.onload = function() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            };
            updateUndoRedoButtons();
        }

        function updateUndoRedoButtons() {
            document.getElementById('undoBtn').disabled = historyStep <= 0;
            document.getElementById('redoBtn').disabled = historyStep >= history.length - 1;
            
            document.getElementById('undoBtn').style.opacity = historyStep <= 0 ? '0.5' : '1';
            document.getElementById('redoBtn').style.opacity = historyStep >= history.length - 1 ? '0.5' : '1';
        }

        function fillCanvas() {
            const color = `rgba(${currentColor.r}, ${currentColor.g}, ${currentColor.b}, ${currentOpacity})`;
            ctx.fillStyle = color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveState();
        }

        function clearCanvas() {
            ctx.fillStyle = canvasBg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveState();
        }

        function downloadCanvas() {
            const link = document.createElement('a');
            link.download = 'drawing-' + Date.now() + '.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Image handling
        let uploadImageSrc = null;
        let originalImageWidth = 0;
        let originalImageHeight = 0;
        let aspectRatio = 1;

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadImageSrc = e.target.result;
                const img = new Image();
                img.onload = function() {
                    originalImageWidth = img.width;
                    originalImageHeight = img.height;
                    aspectRatio = img.width / img.height;
                    
                    document.getElementById('resizePreview').src = uploadImageSrc;
                    
                    const maxWidth = canvas.width * 0.8;
                    const maxHeight = canvas.height * 0.8;
                    let defaultWidth = img.width;
                    let defaultHeight = img.height;
                    
                    if (defaultWidth > maxWidth || defaultHeight > maxHeight) {
                        const scale = Math.min(maxWidth / defaultWidth, maxHeight / defaultHeight);
                        defaultWidth = defaultWidth * scale;
                        defaultHeight = defaultHeight * scale;
                    }
                    
                    document.getElementById('resizeWidth').value = Math.round(defaultWidth);
                    document.getElementById('resizeHeight').value = Math.round(defaultHeight);
                    
                    document.getElementById('resizeModal').classList.remove('hidden');
                    document.getElementById('resizeModal').classList.add('flex');
                };
                img.src = uploadImageSrc;
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function closeResizeModal() {
            document.getElementById('resizeModal').classList.add('hidden');
            document.getElementById('resizeModal').classList.remove('flex');
            uploadImageSrc = null;
        }

        function applyImageResize() {
            if (!uploadImageSrc) return;
            
            const width = parseInt(document.getElementById('resizeWidth').value) || 100;
            const height = parseInt(document.getElementById('resizeHeight').value) || 100;
            const position = document.getElementById('imagePosition').value;
            
            let x, y;
            
            switch(position) {
                case 'top-left': x = 0; y = 0; break;
                case 'top-right': x = canvas.width - width; y = 0; break;
                case 'bottom-left': x = 0; y = canvas.height - height; break;
                case 'bottom-right': x = canvas.width - width; y = canvas.height - height; break;
                default: x = (canvas.width - width) / 2; y = (canvas.height - height) / 2; break;
            }
            
            const img = new Image();
            img.onload = function() {
                ctx.drawImage(img, x, y, width, height);
                saveState();
                closeResizeModal();
            };
            img.src = uploadImageSrc;
        }

        document.getElementById('resizeWidth').addEventListener('input', function() {
            if (document.getElementById('maintainAspect').checked && originalImageWidth > 0) {
                const newWidth = parseInt(this.value) || 0;
                const newHeight = Math.round(newWidth / aspectRatio);
                document.getElementById('resizeHeight').value = newHeight;
            }
        });

        document.getElementById('resizeHeight').addEventListener('input', function() {
            if (document.getElementById('maintainAspect').checked && originalImageHeight > 0) {
                const newHeight = parseInt(this.value) || 0;
                const newWidth = Math.round(newHeight * aspectRatio);
                document.getElementById('resizeWidth').value = newWidth;
            }
        });

        function drawPolygon(ctx, startX, startY, currentX, currentY, sides) {
            const radius = Math.sqrt(Math.pow(currentX - startX, 2) + Math.pow(currentY - startY, 2));
            const angle = Math.atan2(currentY - startY, currentX - startX);
            
            ctx.beginPath();
            for (let i = 0; i < sides; i++) {
                const currentAngle = angle + (i * 2 * Math.PI / sides);
                const x = startX + radius * Math.cos(currentAngle);
                const y = startY + radius * Math.sin(currentAngle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.stroke();
        }

        function roundRect(ctx, x, y, width, height, radius) {
            const xPos = width >= 0 ? x : x + width;
            const yPos = height >= 0 ? y : y + height;
            const w = Math.abs(width);
            const h = Math.abs(height);
            const r = Math.min(radius, w / 2, h / 2);
            
            ctx.moveTo(xPos + r, yPos);
            ctx.lineTo(xPos + w - r, yPos);
            ctx.quadraticCurveTo(xPos + w, yPos, xPos + w, yPos + r);
            ctx.lineTo(xPos + w, yPos + h - r);
            ctx.quadraticCurveTo(xPos + w, yPos + h, xPos + w - r, yPos + h);
            ctx.lineTo(xPos + r, yPos + h);
            ctx.quadraticCurveTo(xPos, yPos + h, xPos, yPos + h - r);
            ctx.lineTo(xPos, yPos + r);
            ctx.quadraticCurveTo(xPos, yPos, xPos + r, yPos);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
                e.preventDefault();
                undo();
                return;
            }
            
            if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
                e.preventDefault();
                redo();
                return;
            }
            
            if (e.key === 'b') setTool('brush');
            if (e.key === 'l') setTool('line');
            if (e.key === 'r') setTool('rectangle');
            if (e.key === 'c') setTool('circle');
            if (e.key === 't') setTool('triangle');
            if (e.key === 'h') setTool('hexagon');
            if (e.key === 'p') setTool('pentagon');
            if (e.key === 'u') setTool('rounded-rectangle');
            if (e.key === 'e') setTool('eraser');
            if (e.key === 'x') setTool('text');
            if (e.key === 'f') fillCanvas();
            if (e.key === 'Delete' || e.key === 'Clear') clearCanvas();
        });
    </script>
</body>
